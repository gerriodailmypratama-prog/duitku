<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offline · Duitku</title>
<style>
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:linear-gradient(135deg,#0b1220,#1f1147);color:#fff;text-align:center;padding:24px}
.card{max-width:420px}
h1{margin:0 0 8px;font-size:28px}
p{margin:0 0 16px;opacity:.8;line-height:1.5}
button{background:#6366f1;color:#fff;border:0;border-radius:12px;padding:12px 20px;font-size:16px;font-weight:600;cursor:pointer}
button:hover{background:#4f46e5}
.icon{font-size:64px;margin-bottom:12px}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📶</div>
  <h1>Lo lagi offline</h1>
  <p>Tenang, data lo aman di device. Begitu koneksi balik, semua sync.</p>
  <button onclick="location.reload()">Coba Lagi</button>
</div>
</body>
</html>
