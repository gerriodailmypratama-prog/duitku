<!doctype html>
<html lang="id" data-theme="auto" data-accent="violet">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Duitku">
  <meta name="description" content="Personal finance tracker PWA — daily life, projects, multi-currency, offline-first.">
  <title>Duitku — Personal Finance Tracker</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon.svg">

  <!-- Tailwind via CDN (utility helpers; we use mainly custom CSS) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (window.tailwind) {
      tailwind.config = {
        darkMode: ['selector', '[data-theme="dark"]'],
        theme: { extend: { fontFamily: { sans: ['Inter','system-ui','sans-serif'] } } }
      };
    }
  </script>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- App shell -->
  <div id="app">
    <!-- Sidebar (desktop) -->
    <aside class="sidebar" aria-label="Main navigation">
      <div class="brand">💸 Duitku</div>
      <button data-nav="home"><span>🏠</span> Home</button>
      <button data-nav="trans"><span>📋</span> Transactions</button>
      <button data-nav="stats"><span>📊</span> Analytics</button>
      <button data-nav="projects"><span>🎒</span> Projects</button>
      <button data-nav="budget"><span>🎯</span> Budget</button>
      <button data-nav="goals"><span>🏆</span> Goals</button>
      <button data-nav="profile"><span>⚙️</span> Settings</button>
    </aside>

    <!-- Main content -->
    <main id="screen-root" role="main">
      <!-- Skeleton placeholder while loading -->
      <div class="screen">
        <div class="skel" style="height:80px; margin-bottom:12px;"></div>
        <div class="skel" style="height:160px; margin-bottom:12px;"></div>
        <div class="skel" style="height:240px;"></div>
      </div>
    </main>
  </div>

  <!-- FAB -->
  <button class="fab" id="fab" aria-label="Tambah transaksi">+</button>

  <!-- Bottom navigation (mobile) -->
  <nav class="bottom-nav" aria-label="Tab bar">
    <button data-nav="home"   aria-label="Home"><span class="ico">🏠</span><span>Home</span></button>
    <button data-nav="trans"  aria-label="Transactions"><span class="ico">📋</span><span>Trans</span></button>
    <span class="fab-slot" aria-hidden="true"></span>
    <button data-nav="stats"  aria-label="Stats"><span class="ico">📊</span><span>Stats</span></button>
    <button data-nav="profile" aria-label="Profile"><span class="ico">👤</span><span>Profile</span></button>
  </nav>

  <!-- Bottom sheet -->
  <div class="sheet-backdrop" id="sheet-backdrop"></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
    <div class="grabber" aria-hidden="true"></div>
    <div id="sheet-content"></div>
  </div>

  <!-- Toasts -->
  <div class="toast-container" id="toasts" aria-live="polite" aria-atomic="true"></div>

  <!-- Dexie -->
  <script src="https://unpkg.com/dexie@4.0.8/dist/dexie.min.js"></script>
  <!-- Chart.js (loaded lazily by charts.js when needed) -->

  <script src="db.js"></script>
  <script src="ui.js"></script>
  <script src="charts.js" defer></script>
  <script src="app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
